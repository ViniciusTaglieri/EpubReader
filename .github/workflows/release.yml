name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Leitor EPUB ${{ github.ref_name }}'
          releaseBody: |
            ## Leitor EPUB ${{ github.ref_name }}

            Leitor EPUB local para desktop, construído com Tauri, Rust, React e SQLite.

            ### Download
            - **Windows (instalador .msi)** — recomendado
            - **Windows (instalador .exe / NSIS)** — alternativo

            Baixe o arquivo correspondente ao seu sistema em **Assets** abaixo.
          releaseDraft: true
          prerelease: false
